name: Deploy to Production

on:
  push:
    branches: ['main']
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-api-gateway:
    name: Deploy API Gateway to Fly.io
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          echo "Deploying API Gateway to Fly.io..."
          # flyctl deploy --config apps/api-gateway/fly.toml
          echo "⏳ Fly.io deployment configuration pending"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-planning-service:
    name: Deploy Planning Service to Fly.io
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          echo "Deploying Planning Service to Fly.io..."
          # flyctl deploy --config apps/planning-service/fly.toml
          echo "⏳ Fly.io deployment configuration pending"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web App to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          echo "Deploying Web App to Vercel..."
          # Install Vercel CLI and deploy
          # npm i -g vercel
          # vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "⏳ Vercel deployment configuration pending"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy-api-gateway]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

  notify-deployment:
    name: Notify Deployment
    needs: [deploy-api-gateway, deploy-planning-service, deploy-web]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send deployment notification
        run: |
          echo "🚀 Production deployment completed successfully!"
          echo "Version: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Services deployed:"
          echo "  - API Gateway: ✅"
          echo "  - Planning Service: ✅"
          echo "  - Web App: ✅"
