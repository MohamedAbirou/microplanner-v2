services:
  - type: web
    name: microplanner-api
    runtime: docker
    dockerfilePath: ./apps/api-gateway/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: microplanner-graphql
    runtime: docker
    dockerfilePath: ./apps/graphql-gateway/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: API_GATEWAY_URL
        sync: false
      - key: NEST_GRAPHQL_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLERK_DOMAIN
        sync: false
      - key: FRONTEND_URL
        sync: false
