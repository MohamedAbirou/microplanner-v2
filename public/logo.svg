<!-- MicroPlanner Logo: Intelligent Brain + Calendar Grid -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer Circle (Calendar Grid Background) -->
  <circle cx="100" cy="100" r="90" fill="url(#primaryGradient)" opacity="0.1"/>

  <!-- Calendar Grid Pattern -->
  <g opacity="0.3">
    <!-- Vertical Lines -->
    <line x1="40" y1="40" x2="40" y2="160" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="70" y1="40" x2="70" y2="160" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="100" y1="40" x2="100" y2="160" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="130" y1="40" x2="130" y2="160" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="160" y1="40" x2="160" y2="160" stroke="url(#primaryGradient)" stroke-width="2"/>

    <!-- Horizontal Lines -->
    <line x1="40" y1="40" x2="160" y2="40" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="40" y1="70" x2="160" y2="70" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="40" y1="100" x2="160" y2="100" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="40" y1="130" x2="160" y2="130" stroke="url(#primaryGradient)" stroke-width="2"/>
    <line x1="40" y1="160" x2="160" y2="160" stroke="url(#primaryGradient)" stroke-width="2"/>
  </g>

  <!-- AI Brain Network (Center) -->
  <g>
    <!-- Central Node -->
    <circle cx="100" cy="100" r="12" fill="url(#secondaryGradient)"/>

    <!-- Surrounding Nodes (forming a neural network pattern) -->
    <circle cx="70" cy="70" r="8" fill="url(#primaryGradient)"/>
    <circle cx="130" cy="70" r="8" fill="url(#primaryGradient)"/>
    <circle cx="70" cy="130" r="8" fill="url(#primaryGradient)"/>
    <circle cx="130" cy="130" r="8" fill="url(#primaryGradient)"/>

    <!-- Outer Ring Nodes -->
    <circle cx="55" cy="100" r="6" fill="url(#secondaryGradient)" opacity="0.7"/>
    <circle cx="145" cy="100" r="6" fill="url(#secondaryGradient)" opacity="0.7"/>
    <circle cx="100" cy="55" r="6" fill="url(#secondaryGradient)" opacity="0.7"/>
    <circle cx="100" cy="145" r="6" fill="url(#secondaryGradient)" opacity="0.7"/>

    <!-- Connection Lines (Neural Network) -->
    <line x1="100" y1="100" x2="70" y2="70" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="100" x2="130" y2="70" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="100" x2="70" y2="130" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="100" x2="130" y2="130" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.5"/>

    <line x1="100" y1="100" x2="55" y2="100" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="145" y2="100" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="100" y2="55" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="100" y2="145" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.4"/>

    <!-- Inter-node connections -->
    <line x1="70" y1="70" x2="130" y2="70" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="70" y1="130" x2="130" y2="130" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="70" y1="70" x2="70" y2="130" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="130" y1="70" x2="130" y2="130" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Subtle Glow Effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#secondaryGradient)" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.15"/>
</svg>
