<!-- MicroPlanner Logo Icon - "The Micro Maestro" -->
<!-- Concept: Letter "M" formed by ascending bars (productivity growth) + calendar blocks -->
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand Gradient: Blue → Purple -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle (optional, can be removed for transparent) -->
  <circle cx="60" cy="60" r="58" fill="url(#brandGradient)" opacity="0.05"/>

  <!-- Left Bar (Short - represents Monday/start of week) -->
  <rect x="20" y="70" width="14" height="35" rx="4" fill="url(#brandGradient)" opacity="0.7"/>

  <!-- Left-Center Bar (Medium-Short) -->
  <rect x="38" y="55" width="14" height="50" rx="4" fill="url(#brandGradient)" opacity="0.85"/>

  <!-- Center Bar (Tallest - peak productivity) -->
  <rect x="56" y="30" width="14" height="75" rx="4" fill="url(#brandGradient)" filter="url(#glow)"/>

  <!-- Right-Center Bar (Medium-Short) -->
  <rect x="74" y="55" width="14" height="50" rx="4" fill="url(#brandGradient)" opacity="0.85"/>

  <!-- Right Bar (Short - represents Friday/end of week) -->
  <rect x="92" y="70" width="14" height="35" rx="4" fill="url(#brandGradient)" opacity="0.7"/>

  <!-- AI Accent Dots (Neural Network Pattern) -->
  <circle cx="60" cy="22" r="3" fill="#7C3AED" opacity="0.9"/>
  <circle cx="48" cy="45" r="2" fill="#2563EB" opacity="0.6"/>
  <circle cx="72" cy="45" r="2" fill="#2563EB" opacity="0.6"/>

  <!-- Subtle Calendar Grid Lines (Top) -->
  <line x1="20" y1="15" x2="106" y2="15" stroke="url(#brandGradient)" stroke-width="1.5" opacity="0.3"/>
  <line x1="30" y1="10" x2="30" y2="20" stroke="url(#brandGradient)" stroke-width="1.5" opacity="0.2"/>
  <line x1="50" y1="10" x2="50" y2="20" stroke="url(#brandGradient)" stroke-width="1.5" opacity="0.2"/>
  <line x1="70" y1="10" x2="70" y2="20" stroke="url(#brandGradient)" stroke-width="1.5" opacity="0.2"/>
  <line x1="90" y1="10" x2="90" y2="20" stroke="url(#brandGradient)" stroke-width="1.5" opacity="0.2"/>
</svg>
