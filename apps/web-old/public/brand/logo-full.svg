<!-- MicroPlanner Full Logo - Icon + Wordmark -->
<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand Gradient: Blue → Purple -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon (Scaled down) -->
  <g transform="translate(0, 10)">
    <!-- Left Bar -->
    <rect x="8" y="35" width="9" height="23" rx="2.5" fill="url(#brandGradient)" opacity="0.7"/>
    <!-- Left-Center Bar -->
    <rect x="20" y="25" width="9" height="33" rx="2.5" fill="url(#brandGradient)" opacity="0.85"/>
    <!-- Center Bar (Tallest) -->
    <rect x="32" y="10" width="9" height="48" rx="2.5" fill="url(#brandGradient)" filter="url(#glow)"/>
    <!-- Right-Center Bar -->
    <rect x="44" y="25" width="9" height="33" rx="2.5" fill="url(#brandGradient)" opacity="0.85"/>
    <!-- Right Bar -->
    <rect x="56" y="35" width="9" height="23" rx="2.5" fill="url(#brandGradient)" opacity="0.7"/>

    <!-- AI Dots -->
    <circle cx="36.5" cy="5" r="2" fill="#7C3AED" opacity="0.9"/>
    <circle cx="28" cy="18" r="1.3" fill="#2563EB" opacity="0.6"/>
    <circle cx="45" cy="18" r="1.3" fill="#2563EB" opacity="0.6"/>

    <!-- Calendar Grid -->
    <line x1="8" y1="3" x2="65" y2="3" stroke="url(#brandGradient)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Wordmark "MicroPlanner" -->
  <g transform="translate(85, 40)">
    <!-- "Micro" in regular weight -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="url(#brandGradient)">
      Micro
    </text>

    <!-- "Planner" in bold weight -->
    <text x="82" y="0" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="url(#brandGradient)">
      Planner
    </text>
  </g>

  <!-- Tagline (optional, can be removed) -->
  <text x="85" y="55" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#64748B" opacity="0.8">
    AI-Powered Weekly Planning
  </text>
</svg>
