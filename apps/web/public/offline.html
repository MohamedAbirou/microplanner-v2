<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · MicroPlanner</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #fafafa;
        padding: 24px;
      }
      @media (prefers-color-scheme: light) {
        body { background: #ffffff; color: #0a0a0a; }
      }
      .card { max-width: 420px; text-align: center; }
      .badge {
        width: 56px; height: 56px; border-radius: 16px;
        background: #2563eb; color: #fff;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px; font-size: 28px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; opacity: 0.7; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #2563eb; color: #fff; border: 0;
        padding: 10px 20px; border-radius: 10px; font-size: 14px;
        font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">✦</div>
      <h1>You're offline</h1>
      <p>
        MicroPlanner can't reach the network right now. Any changes you make will
        sync automatically once you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
