<!-- MicroPlanner Logo - White (for dark backgrounds) -->
<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Icon -->
  <g transform="translate(0, 10)">
    <rect x="8" y="35" width="9" height="23" rx="2.5" fill="#FFFFFF" opacity="0.7"/>
    <rect x="20" y="25" width="9" height="33" rx="2.5" fill="#FFFFFF" opacity="0.85"/>
    <rect x="32" y="10" width="9" height="48" rx="2.5" fill="#FFFFFF"/>
    <rect x="44" y="25" width="9" height="33" rx="2.5" fill="#FFFFFF" opacity="0.85"/>
    <rect x="56" y="35" width="9" height="23" rx="2.5" fill="#FFFFFF" opacity="0.7"/>

    <circle cx="36.5" cy="5" r="2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="28" cy="18" r="1.3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="45" cy="18" r="1.3" fill="#FFFFFF" opacity="0.6"/>

    <line x1="8" y1="3" x2="65" y2="3" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(85, 40)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">
      Micro
    </text>
    <text x="82" y="0" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
      Planner
    </text>
  </g>

  <text x="85" y="55" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#94A3B8">
    AI-Powered Weekly Planning
  </text>
</svg>
