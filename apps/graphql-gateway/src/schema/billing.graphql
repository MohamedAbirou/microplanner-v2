# Billing & Subscriptions

# ============================================
# SUBSCRIPTION
# ============================================

type UserSubscription {
  id: ID!
  userId: ID!
  tier: SubscriptionTier!
  status: SubscriptionStatus!
  stripeCustomerId: String
  stripeSubscriptionId: String
  currentPeriodStart: DateTime
  currentPeriodEnd: DateTime
  cancelAtPeriodEnd: Boolean!
  canceledAt: DateTime
  trialStart: DateTime
  trialEnd: DateTime
  features: FeatureLimits!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type FeatureLimits {
  # Goal limits
  maxGoals: Int!
  maxActiveGoals: Int!

  # Plan limits
  plansPerWeek: Int!
  plansPerMonth: Int!

  # Task limits
  tasksPerDay: Int!
  maxTasksPerPlan: Int!

  # AI features
  aiModel: String!
  aiGenerations: Int!

  # Premium features
  calendarSync: Boolean!
  offlineMode: Boolean!
  advancedInsights: Boolean!
  teamWorkspaces: Boolean!
  apiAccess: Boolean!
  prioritySupport: Boolean!
  customBranding: Boolean!

  # Legacy aliases still selected by parts of the frontend (nullable)
  maxTasks: Int
  maxProjects: Int
  aiPlansPerMonth: Int
  teamMembers: Int
}

type BillingInfo {
  stripeCustomerId: String
  paymentMethod: PaymentMethod
  upcomingInvoice: UpcomingInvoice
  invoices: [Invoice!]!
}

type PaymentMethod {
  brand: String!
  last4: String!
  expMonth: Int!
  expYear: Int!
}

type UpcomingInvoice {
  amountDue: Int!
  currency: String!
  periodStart: DateTime!
  periodEnd: DateTime!
  total: Int!
}

type Invoice {
  id: String!
  amountPaid: Int!
  amountDue: Int!
  currency: String!
  status: String!
  invoicePdf: String
  hostedInvoiceUrl: String
  created: DateTime!
}

type CheckoutSession {
  sessionId: String!
  url: String!
}

type UsageStats {
  # Current period usage
  goalsCreated: Int!
  plansGenerated: Int!
  tasksCreated: Int!
  aiGenerationsUsed: Int!

  # Limits
  goalLimit: Int!
  planLimit: Int!
  taskLimit: Int!
  aiGenerationLimit: Int!

  # Percentages
  goalUsagePercent: Float!
  planUsagePercent: Float!
  taskUsagePercent: Float!
  aiUsagePercent: Float!

  # Reset info
  resetsAt: DateTime!
}

# ============================================
# QUERIES
# ============================================

extend type Query {
  # Subscription info
  subscription: UserSubscription

  # Billing
  billingInfo: BillingInfo

  # Usage stats
  usageStats: UsageStats!

  # Feature availability
  canUseFeature(feature: String!): Boolean!
}

# ============================================
# MUTATIONS
# ============================================

extend type Mutation {
  # Create checkout session
  createCheckoutSession(
    tier: SubscriptionTier!
    interval: BillingInterval!
  ): CheckoutSession!

  # Manage subscription
  upgradeSubscription(tier: SubscriptionTier!): CheckoutSession!
  cancelSubscription: UserSubscription!
  resumeSubscription: UserSubscription!

  # Update payment method
  updatePaymentMethod(paymentMethodId: String!): PaymentMethod!

  # Portal
  createBillingPortalSession: BillingPortalSession!
}

enum BillingInterval {
  MONTHLY
  YEARLY
}

type BillingPortalSession {
  url: String!
}
