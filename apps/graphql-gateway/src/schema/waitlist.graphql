# Waitlist types for early access management

type WaitlistEntry {
  id: ID!
  email: String!
  name: String
  useCase: WaitlistUseCase
  referralSource: String
  position: Int!
  status: WaitlistStatus!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type WaitlistStats {
  totalCount: Int!
  pendingCount: Int!
  approvedCount: Int!
  averageWaitTime: Float
}

type JoinWaitlistResult {
  success: Boolean!
  message: String!
  position: Int
  email: String
}

# Enums
enum WaitlistUseCase {
  PERSONAL
  TEAM
  BUSINESS
  OTHER
}

enum WaitlistStatus {
  PENDING
  APPROVED
  INVITED
  CONVERTED
  DECLINED
}

# Queries
extend type Query {
  # Get waitlist statistics (public)
  waitlistStats: WaitlistStats!

  # Get waitlist entry by email (admin only)
  waitlistEntry(email: String!): WaitlistEntry

  # Get all waitlist entries (admin only)
  waitlistEntries(
    status: WaitlistStatus
    skip: Int
    take: Int
  ): [WaitlistEntry!]!
}

# Mutations
extend type Mutation {
  # Join the waitlist (public)
  joinWaitlist(input: JoinWaitlistInput!): JoinWaitlistResult!

  # Update waitlist entry status (admin only)
  updateWaitlistStatus(
    id: ID!
    status: WaitlistStatus!
  ): WaitlistEntry!

  # Send invitation to waitlist member (admin only)
  sendWaitlistInvitation(id: ID!): Boolean!
}

# Inputs
input JoinWaitlistInput {
  email: String!
  name: String
  useCase: WaitlistUseCase
  referralSource: String
}
