# Analytics and Insights
# NOTE: ProductivityScore type + productivityScores query live in
# productivity.graphql — defining them here too made the SDL invalid.

type WeeklyStats {
  weekStart: DateTime!
  weekEnd: DateTime!

  # Task completion
  totalTasks: Int!
  completedTasks: Int!
  completionRate: Float!

  # Time tracking
  totalHoursScheduled: Float!
  totalHoursCompleted: Float!
  focusHours: Float!

  # Goal progress
  activeGoals: Int!
  goalsCompletionRate: Float!

  # Productivity
  averageProductivityScore: Int
  bestDay: String
  worstDay: String

  # Streaks
  currentStreak: Int!
  longestStreak: Int!
}

type GoalAnalyticsReport {
  goalId: ID!
  goal: Goal!

  # Completion stats
  completionRate: Float!
  totalCompletions: Int!
  totalScheduled: Int!

  # Time analysis
  averageDuration: Float
  bestTimeOfDay: String

  # Progress
  currentStreak: Int!
  longestStreak: Int!
  weeklyProgress: [WeeklyGoalProgress!]!
}

type WeeklyGoalProgress {
  week: String!
  scheduled: Int!
  completed: Int!
  completionRate: Float!
}

type DashboardStats {
  # Today
  todayTasks: Int!
  todayCompleted: Int!
  todayCompletionRate: Float!

  # Week
  weekTasks: Int!
  weekCompleted: Int!
  weekCompletionRate: Float!

  # Goals
  activeGoals: Int!
  goalsMilestones: Int!

  # Streaks
  currentStreak: Int!
  longestStreak: Int!

  # Plans
  totalPlans: Int!
  averagePlanQuality: Float
}

# Queries
extend type Query {
  # Dashboard stats (quick overview)
  dashboardStats: DashboardStats!

  # Weekly analytics
  weeklyStats(weekStart: DateTime): WeeklyStats!

  # insights
  insights(type: String, limit: Int): [String!]!

  # Goal-specific analytics
  goalAnalyticsReport(goalId: ID!): GoalAnalyticsReport!

  # All goals analytics
  # allGoalsAnalyticsReport: [GoalAnalyticsReport!]!
}

# Mutations
extend type Mutation {
  # Recompute insights (fresh fetch server-side)
  generateInsights: [String!]!
}
