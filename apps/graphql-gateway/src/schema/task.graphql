# Task types

type Task {
  id: ID!
  userId: ID!
  goalId: ID
  planId: ID
  parentTaskId: ID
  projectId: ID

  # Task details
  title: String!
  notes: String
  priority: Int!
  tags: [String!]!

  # Scheduling
  scheduledDate: DateTime!
  startTime: String!
  endTime: String!
  durationMinutes: Int!

  # Recurrence
  recurrenceRule: RecurrenceRule

  # Recurring instance metadata (for expanded instances)
  isRecurringInstance: Boolean
  recurringTaskId: ID
  instanceDate: DateTime

  # Status
  isCompleted: Boolean!
  completedAt: DateTime
  isSkipped: Boolean!
  skippedReason: String
  skippedAt: DateTime

  # Time tracking
  actualStartTime: DateTime
  actualEndTime: DateTime
  timeSpentMinutes: Int!
  isTimerRunning: Boolean!
  timerStartedAt: DateTime

  # Source tracking
  aiGenerated: Boolean!
  manuallyAdded: Boolean!
  manuallyMoved: Boolean!
  aiReasoning: String

  # Calendar sync
  calendarEventId: String
  calendarProvider: String
  syncedAt: DateTime
  syncStatus: SyncStatus!
  syncError: String

  # Offline support
  localId: String
  pendingSync: Boolean!
  offlineCreatedAt: DateTime

  # Relations
  goal: Goal
  project: Project
  parentTask: Task
  subtasks: [Task!]!
  dependencies: [TaskDependency!]!
  blockedBy: [TaskDependency!]!
  timeEntries: [TimeEntry!]!

  # Lightweight counts for list views (resolved via batch loaders)
  dependencyCount: Int
  blockedByCount: Int
  subtaskCount: Int

  # Timestamps
  createdAt: DateTime!
  updatedAt: DateTime!
}

type RecurrenceRule {
  frequency: RecurrenceFrequency!
  interval: Int!
  daysOfWeek: [Int!]
  dayOfMonth: Int
  monthOfYear: Int
  endDate: DateTime
  occurrences: Int
}

input RecurrenceRuleInput {
  frequency: RecurrenceFrequency!
  interval: Int!
  daysOfWeek: [Int!]
  dayOfMonth: Int
  monthOfYear: Int
  endDate: DateTime
  occurrences: Int
}

enum RecurrenceFrequency {
  DAILY
  WEEKLY
  MONTHLY
  YEARLY
}

type TaskDependency {
  id: ID!
  dependentTaskId: ID!
  blockingTaskId: ID!
  type: DependencyType!
  dependentTask: Task!
  blockingTask: Task!
  createdAt: DateTime!
}

type TimeEntry {
  taskId: ID!
  actualStartTime: DateTime
  actualEndTime: DateTime
  timeSpentMinutes: Int!
  isTimerRunning: Boolean!
  timerStartedAt: DateTime
}

# A discrete logged time increment (manual entry or a stopped timer).
type TimeLogEntry {
  id: ID!
  taskId: ID!
  minutes: Int!
  note: String
  source: String!
  startedAt: DateTime!
  createdAt: DateTime!
}

# One flattened row of the date-bounded time report (for tables / CSV export).
type TimeReportRow {
  id: ID!
  taskId: ID!
  taskTitle: String!
  goalTitle: String
  projectName: String
  minutes: Int!
  note: String
  source: String!
  startedAt: DateTime!
}

input UpdateTimeEntryInput {
  minutes: Int
  note: String
  startedAt: DateTime
}

# Queries
extend type Query {
  # Get single task
  task(id: ID!): Task

  # Get tasks
  tasks(
    filter: TaskFilterInput
    sort: TaskSortInput
    goalId: ID
    projectId: ID
    scheduledDate: DateTime
    isCompleted: Boolean
    orderBy: TaskOrderBy
    skip: Int
    take: Int
  ): [Task!]!

  # Get tasks by project
  tasksByProject(projectId: ID!): [Task!]!

  # Get tasks by goal
  tasksByGoal(goalId: ID!): [Task!]!

  # Search tasks
  searchTasks(query: String!): [Task!]!

  # Get task with dependencies
  taskWithDependencies(id: ID!): TaskWithDependencies!

  # Get subtasks
  subtasks(parentTaskId: ID!): [Task!]!

  # Suggest the next available slot to reschedule a task
  rescheduleSuggestion(taskId: ID!): RescheduleSuggestion

  # A task's time-entry history (lazy — detail view only)
  taskTimeEntries(taskId: ID!, take: Int, skip: Int): [TimeLogEntry!]!

  # Date-bounded flat time report for tables / CSV export
  timeReport(startDate: DateTime!, endDate: DateTime!): [TimeReportRow!]!
}

type RescheduleSuggestion {
  taskId: ID!
  scheduledDate: DateTime!
  startTime: String!
  endTime: String!
  reason: String!
}

# Mutations
extend type Mutation {
  # Create task
  createTask(input: CreateTaskInput!): Task!

  # Update task
  updateTask(id: ID!, input: UpdateTaskInput!): Task!

  # Delete task
  deleteTask(id: ID!): Boolean!

  # Complete task
  completeTask(id: ID!): Task!

  # Uncomplete task
  uncompleteTask(id: ID!): Task!

  # Skip task
  skipTask(id: ID!, reason: String): Task!

  # Create subtask
  createSubtask(input: CreateSubtaskInput!): Task!

  # Create dependency
  createTaskDependency(input: CreateTaskDependencyInput!): TaskDependency!

  # Delete dependency
  deleteTaskDependency(id: ID!): Boolean!

  # Time tracking
  startTimer(taskId: ID!): TimeEntry!
  stopTimer(taskId: ID!): TimeEntry!
  logTime(taskId: ID!, minutes: Int!, date: DateTime): TimeEntry!

  # Time entry history edits
  updateTimeEntry(id: ID!, input: UpdateTimeEntryInput!): TimeLogEntry!
  deleteTimeEntry(id: ID!): Boolean!

  # Bulk operations
  bulkUpdateTasks(ids: [ID!]!, input: UpdateTaskInput!): [Task!]!
  bulkDeleteTasks(ids: [ID!]!): BulkDeleteResult!
}

type BulkDeleteResult {
  count: Int!
}

# Subscriptions
extend type Subscription {
  taskUpdated(userId: ID!): Task!
  taskCreated(userId: ID!): Task!
  taskDeleted(userId: ID!): ID!
  timerStarted(userId: ID!): TimeEntry!
  timerStopped(userId: ID!): TimeEntry!
}

# Additional types
type TaskWithDependencies {
  id: ID!
  title: String!
  isCompleted: Boolean!
  scheduledDate: DateTime!
  blockingTasks: [TaskInfo!]!
  dependentTasks: [TaskInfo!]!
  isBlocked: Boolean!
  canStart: Boolean!
}

type TaskInfo {
  id: ID!
  title: String!
  isCompleted: Boolean!
}

# Inputs
input CreateTaskInput {
  goalId: ID
  projectId: ID
  title: String!
  notes: String
  priority: Int
  tags: [String!]
  scheduledDate: DateTime!
  startTime: String!
  endTime: String
  durationMinutes: Int!
  recurrenceRule: RecurrenceRuleInput
}

input UpdateTaskInput {
  title: String
  notes: String
  priority: Int
  tags: [String!]
  scheduledDate: DateTime
  startTime: String
  endTime: String
  durationMinutes: Int
  isCompleted: Boolean
  goalId: ID
  projectId: ID
  recurrenceRule: RecurrenceRuleInput
}

input CreateSubtaskInput {
  parentTaskId: ID!
  title: String!
  durationMinutes: Int
  scheduledDate: DateTime
}

input CreateTaskDependencyInput {
  dependentTaskId: ID!
  blockingTaskId: ID!
  type: DependencyType
}

# Filter and Sort Inputs
input DateRangeInput {
  start: DateTime!
  end: DateTime!
}

input TaskFilterInput {
  date: String
  weekStart: String
  dateRange: DateRangeInput
  goalId: ID
  planId: ID
  projectId: ID
  priority: Int
  tags: [String!]
  search: String
  scheduledDate: DateTime
  isCompleted: Boolean
  aiGenerated: Boolean
}

input TaskSortInput {
  field: TaskSortField!
  direction: SortDirection!
}

enum TaskSortField {
  SCHEDULED_DATE
  PRIORITY
  CREATED_AT
  UPDATED_AT
  TITLE
}

enum SortDirection {
  ASC
  DESC
}

# Enums
enum TaskOrderBy {
  SCHEDULED_DATE_ASC
  SCHEDULED_DATE_DESC
  PRIORITY_DESC
  PRIORITY_ASC
  CREATED_DESC
  CREATED_ASC
}

enum DependencyType {
  BLOCKS
  BLOCKED_BY
  RELATED_TO
}

enum SyncStatus {
  PENDING
  SYNCING
  SYNCED
  FAILED
  CONFLICT
}
