# User Settings and Profile Management

type User {
  id: ID!
  clerkId: String!
  email: String!
  name: String
  fullName: String
  avatar: String
  timezone: String!

  # Subscription
  tier: SubscriptionTier!
  subscriptionStatus: SubscriptionStatus!

  # Onboarding
  onboardingCompleted: Boolean!
  onboardingStep: Int!

  # Metadata
  language: String!
  context: String
  focusAreas: [String!]!

  # Preferences
  wakeTime: String!
  sleepTime: String!
  workStartTime: String!
  workEndTime: String!
  productivityPeaks: [String!]!
  energyPattern: EnergyPattern

  # Settings (nested for frontend compatibility)
  settings: UserSettings

  # Timestamps
  createdAt: DateTime!
  updatedAt: DateTime!
  lastSeenAt: DateTime!
}

enum SubscriptionTier {
  FREE
  STARTER
  PRO
  PREMIUM
}

enum SubscriptionStatus {
  ACTIVE
  INACTIVE
  PAST_DUE
  CANCELED
  TRIALING
}

type UserSettings {
  id: ID
  userId: ID

  # Profile
  firstName: String
  lastName: String

  # Preferences
  theme: Theme
  energyPattern: EnergyPattern

  # Working hours
  workingHours: WorkingHours
  defaultTaskDuration: Int

  # Notifications
  notifications: NotificationSettings

  # Calendar integrations
  calendarIntegrations: [CalendarIntegration!]

  # Onboarding
  onboardingCompleted: Boolean
  onboardingCompletedAt: DateTime

  createdAt: DateTime
  updatedAt: DateTime
}

type WorkingHours {
  start: String!
  end: String!
}

type NotificationSettings {
  email: Boolean
  push: Boolean
  reminders: Boolean
  weeklySummary: Boolean
  planReminders: Boolean
  taskReminders: Boolean
  goalMilestones: Boolean
  productivityInsights: Boolean
}

type CalendarIntegration {
  provider: CalendarProvider!
  email: String
  isConnected: Boolean!
  lastSyncedAt: DateTime
}

# CalendarProvider enum is defined in calendar.graphql

# Enums
enum Theme {
  LIGHT
  DARK
  SYSTEM
}

enum EnergyPattern {
  MORNING_PERSON
  BALANCED
  NIGHT_OWL
}

# ============================================
# AI MEMORY (learned + declared scheduling preferences)
# ============================================

enum MemoryType {
  TIME_PREFERENCE
  COMPLETION_PATTERN
  ENERGY_INSIGHT
  AVOIDANCE_PATTERN
  CONTEXT_PREFERENCE
}

type AiMemory {
  id: ID!
  memoryType: MemoryType!
  content: JSON!
  confidence: Float!
  useCount: Int!
  source: String
  lastUsedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateAiMemoryInput {
  memoryType: MemoryType!
  content: JSON!
  confidence: Float
}

# ============================================
# REFERRALS
# ============================================

type ReferralEntry {
  id: ID!
  status: String!
  referredName: String!
  createdAt: DateTime!
  completedAt: DateTime
}

type ReferralStats {
  code: String!
  totalReferrals: Int!
  activeReferrals: Int!
  pendingReferrals: Int!
  referrals: [ReferralEntry!]!
}

# Queries
extend type Query {
  # Get current user
  me: User

  # AI memories / scheduling overrides for the current user
  aiMemories: [AiMemory!]!

  # Referral program stats for the current user
  myReferralStats: ReferralStats!

  # Get user by ID (admin only)
  user(id: ID!): User

  # Get user settings
  userSettings: UserSettings

  # Check onboarding status
  onboardingStatus: OnboardingStatus!

  # GDPR: full export of the current user's data
  exportMyData: JSON!
}

type OnboardingStatus {
  completed: Boolean!
  completedAt: DateTime
  currentStep: Int
}

# Mutations
extend type Mutation {
  # Sync/create user from Clerk
  syncUser(input: SyncUserInput!): User!

  # Update user profile
  updateUserProfile(input: UpdateUserProfileInput!): User!

  # Update user settings
  updateUserSettings(input: UpdateUserSettingsInput!): UserSettings!

  # Complete onboarding
  completeOnboarding(input: CompleteOnboardingInput!): OnboardingResult!

  # Web Push subscriptions
  registerPushToken(subscription: JSON!): Boolean!
  unregisterPushToken(endpoint: String!): Boolean!

  # GDPR: permanently delete the account and all associated data
  deleteMyAccount: Boolean!

  # AI memory / scheduling overrides
  createAiMemory(input: CreateAiMemoryInput!): AiMemory!
  deleteAiMemory(id: ID!): Boolean!

  # Referrals
  redeemReferral(code: String!): Boolean!
}

# Complete onboarding with all data at once
# Note: Input types are defined in onboarding.graphql
# This mutation uses the CompleteOnboardingInput from onboarding.graphql

type OnboardingResult {
  success: Boolean!
  message: String
}

# Sync user input (from Clerk)
input SyncUserInput {
  clerkId: String!
  email: String!
  name: String
  avatar: String
  tier: String
}

# Update user profile input
input UpdateUserProfileInput {
  firstName: String
  lastName: String
  name: String
  avatar: String
  timezone: String
}

# Update user settings input
input UpdateUserSettingsInput {
  theme: Theme
  energyPattern: EnergyPattern
  notifications: NotificationSettingsInput
}

input NotificationSettingsInput {
  email: Boolean
  weeklySummary: Boolean
  planReminders: Boolean
  taskReminders: Boolean
  goalMilestones: Boolean
  productivityInsights: Boolean
}
