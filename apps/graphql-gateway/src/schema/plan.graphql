# ============================================================================
# PLAN TYPES
# ============================================================================

"""
Weekly plan generated by AI
"""
type Plan {
  id: ID!
  title: String!
  description: String
  status: PlanStatus!
  qualityScore: Int
  qualityMetrics: JSON
  aiModel: String
  reasoning: JSON
  weekStartDate: DateTime!
  weekEndDate: DateTime!
  generationTime: Float

  tasks: [Task!]!
  goals: [Goal!]!
  user: User!

  totalTasks: Int!
  completedTasks: Int!
  completionRate: Float!

  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
Plan status enum
"""
enum PlanStatus {
  DRAFT
  ACCEPTED
  APPLIED
  ARCHIVED
}

"""
Plan template for marketplace
"""
type PlanTemplate {
  id: ID!
  name: String!
  description: String!
  emoji: String
  category: String
  tags: [String!]!
  isPublic: Boolean!
  isFeatured: Boolean!
  usageCount: Int!
  rating: Float

  creator: User!
  structure: JSON!

  createdAt: DateTime!
  updatedAt: DateTime!
}

# ============================================================================
# PLAN INPUTS
# ============================================================================

"""
Input for generating a new plan
"""
input GeneratePlanInput {
  title: String
  goalIds: [ID!]!
  weekStartDate: DateTime!
  aiModel: String
  preferences: PlanPreferencesInput
}

"""
Plan generation preferences
"""
input PlanPreferencesInput {
  prioritizeMornings: Boolean
  avoidWeekends: Boolean
  bufferTime: Int
  focusBlockDuration: Int
}

"""
Input for creating a plan manually
"""
input CreatePlanInput {
  title: String!
  description: String
  weekStartDate: DateTime!
  goalIds: [ID!]
}

"""
Input for updating a plan
"""
input UpdatePlanInput {
  title: String
  description: String
  status: PlanStatus
}

"""
Filter plans
"""
input PlanFilterInput {
  status: PlanStatus
  startDate: DateTime
  endDate: DateTime
  goalId: ID
}

# ============================================================================
# PLAN QUERIES
# ============================================================================

extend type Query {
  """
  Get all plans for current user
  """
  plans(filter: PlanFilterInput): [Plan!]!

  """
  Get single plan by ID
  """
  plan(id: ID!): Plan

  """
  Get current week's plan
  """
  currentPlan: Plan

  """
  Get plan templates
  """
  planTemplates(
    category: String
    featured: Boolean
    limit: Int
    offset: Int
  ): [PlanTemplate!]!

  """
  Get single plan template
  """
  planTemplate(id: ID!): PlanTemplate
}

# ============================================================================
# PLAN MUTATIONS
# ============================================================================

extend type Mutation {
  """
  Generate a new plan using AI
  """
  generatePlan(input: GeneratePlanInput!): Plan!

  """
  Create a plan manually
  """
  createPlan(input: CreatePlanInput!): Plan!

  """
  Update a plan
  """
  updatePlan(id: ID!, input: UpdatePlanInput!): Plan!

  """
  Accept a generated plan
  """
  acceptPlan(id: ID!): Plan!

  """
  Regenerate a plan for the same week (creates a new draft)
  """
  regeneratePlan(id: ID!): Plan!

  """
  Delete a plan
  """
  deletePlan(id: ID!): Plan!

  """
  Create a plan template
  """
  createPlanTemplate(input: CreatePlanTemplateInput!): PlanTemplate!

  """
  Save an existing plan as a reusable template
  """
  saveAsPlanTemplate(planId: ID!, name: String!, description: String): PlanTemplate!

  """
  Generate a new plan from a template
  """
  generatePlanFromTemplate(input: GenerateFromTemplateInput!): Plan!

  """
  Mark a template as the user's default
  """
  setDefaultPlanTemplate(id: ID!): PlanTemplate!

  """
  Delete a plan template
  """
  deletePlanTemplate(id: ID!): Boolean!
}

"""
Input for generating a plan from a template
"""
input GenerateFromTemplateInput {
  templateId: ID!
  weekStartDate: String!
}

"""
Input for creating a plan template
"""
input CreatePlanTemplateInput {
  name: String!
  description: String!
  emoji: String
  category: String!
  tags: [String!]!
  isPublic: Boolean
  structure: JSON!
}

# ============================================================================
# PLAN SUBSCRIPTIONS
# ============================================================================

extend type Subscription {
  """
  Subscribe to plan generation updates
  """
  planGenerated(userId: ID!): Plan!

  """
  Subscribe to plan updates
  """
  planUpdated(planId: ID!): Plan!
}
