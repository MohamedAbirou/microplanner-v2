# Productivity Features (Work-Life Balance, Focus Time, Kanban)

# ============================================
# WORK HOURS
# ============================================

type WorkHours {
  id: ID!
  userId: ID!
  timezone: String!
  schedule: WorkWeekSchedule!
  enforceWorkHours: Boolean!
  maxMeetingsPerDay: Int
  maxMeetingHoursPerDay: Int
  maxConsecutiveMeetings: Int
  createdAt: DateTime!
  updatedAt: DateTime!
}

type WorkWeekSchedule {
  monday: DaySchedule!
  tuesday: DaySchedule!
  wednesday: DaySchedule!
  thursday: DaySchedule!
  friday: DaySchedule!
  saturday: DaySchedule!
  sunday: DaySchedule!
}

type DaySchedule {
  isWorkDay: Boolean!
  startTime: String
  endTime: String
  breakTimes: [BreakTime!]!
}

type BreakTime {
  start: String!
  end: String!
}

input WorkHoursInput {
  timezone: String
  schedule: WorkWeekScheduleInput
  enforceWorkHours: Boolean
  maxMeetingsPerDay: Int
  maxMeetingHoursPerDay: Int
  maxConsecutiveMeetings: Int
}

input WorkWeekScheduleInput {
  monday: DayScheduleInput
  tuesday: DayScheduleInput
  wednesday: DayScheduleInput
  thursday: DayScheduleInput
  friday: DayScheduleInput
  saturday: DayScheduleInput
  sunday: DayScheduleInput
}

input DayScheduleInput {
  isWorkDay: Boolean!
  startTime: String
  endTime: String
  breakTimes: [BreakTimeInput!]
}

input BreakTimeInput {
  start: String!
  end: String!
}

# ============================================
# FOCUS TIME BLOCKS
# ============================================

type FocusTimeBlock {
  id: ID!
  userId: ID!
  title: String!
  frequency: FocusFrequency!
  daysOfWeek: [Int!]!
  startTime: String
  durationMinutes: Int!
  priority: Int!
  protected: Boolean!
  isActive: Boolean!
  autoSchedule: Boolean!
  preferredTimeSlots: [String!]!
  color: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum FocusFrequency {
  DAILY
  WEEKDAYS
  WEEKLY
  CUSTOM
}

input CreateFocusBlockInput {
  title: String!
  frequency: FocusFrequency!
  daysOfWeek: [Int!]!
  startTime: String
  durationMinutes: Int!
  priority: Int
  protected: Boolean
  autoSchedule: Boolean
  preferredTimeSlots: [String!]
  color: String
}

input UpdateFocusBlockInput {
  title: String
  frequency: FocusFrequency
  daysOfWeek: [Int!]
  startTime: String
  durationMinutes: Int
  priority: Int
  protected: Boolean
  isActive: Boolean
  autoSchedule: Boolean
  preferredTimeSlots: [String!]
  color: String
}

# ============================================
# NO MEETING DAYS
# ============================================

type NoMeetingDay {
  id: ID!
  userId: ID!
  dayOfWeek: Int!
  isActive: Boolean!
  allowExceptions: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input SetNoMeetingDayInput {
  dayOfWeek: Int!
  allowExceptions: Boolean
}

# ============================================
# PRIORITY HOURS
# ============================================

type PriorityHours {
  id: ID!
  userId: ID!
  timeSlots: [PriorityTimeSlot!]!
  prioritizeFocusTime: Boolean!
  prioritizeTasks: Boolean!
  deprioritizeMeetings: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PriorityTimeSlot {
  dayOfWeek: Int!
  startTime: String!
  endTime: String!
  priority: Int!
}

input PriorityHoursInput {
  timeSlots: [PriorityTimeSlotInput!]!
  prioritizeFocusTime: Boolean
  prioritizeTasks: Boolean
  deprioritizeMeetings: Boolean
}

input PriorityTimeSlotInput {
  dayOfWeek: Int!
  startTime: String!
  endTime: String!
  priority: Int!
}

# ============================================
# CALENDAR DEFENSE
# ============================================

type CalendarDefense {
  id: ID!
  userId: ID!
  autoAcceptDuringOpenHours: Boolean!
  autoDeclineDuringFocusTime: Boolean!
  autoDeclineOutsideWorkHours: Boolean!
  autoDeclineDoubleBookings: Boolean!
  requireMinimumNotice: Boolean!
  minimumNoticeHours: Int!
  requireBufferBetweenMeetings: Boolean!
  bufferMinutes: Int!
  suggestShorterMeetings: Boolean!
  defaultMeetingDuration: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CalendarDefenseInput {
  autoAcceptDuringOpenHours: Boolean
  autoDeclineDuringFocusTime: Boolean
  autoDeclineOutsideWorkHours: Boolean
  autoDeclineDoubleBookings: Boolean
  requireMinimumNotice: Boolean
  minimumNoticeHours: Int
  requireBufferBetweenMeetings: Boolean
  bufferMinutes: Int
  suggestShorterMeetings: Boolean
  defaultMeetingDuration: Int
}

# ============================================
# KANBAN BOARDS
# ============================================

type KanbanBoard {
  id: ID!
  userId: ID!
  projectId: ID
  name: String!
  description: String
  isDefault: Boolean!
  columns: [KanbanColumn!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type KanbanColumn {
  id: ID!
  boardId: ID!
  name: String!
  order: Int!
  color: String!
  taskIds: [ID!]!
  tasks: [Task!]!
}

input CreateKanbanBoardInput {
  projectId: ID
  name: String!
  description: String
  isDefault: Boolean
}

input UpdateKanbanBoardInput {
  name: String
  description: String
  isDefault: Boolean
}

input MoveTaskInKanbanInput {
  taskId: ID!
  fromColumnId: ID
  toColumnId: ID!
  position: Int
}

# ============================================
# SMART 1:1 MEETINGS
# ============================================

type Smart1on1 {
  id: ID!
  userId: ID!
  title: String!
  participantEmail: String!
  frequency: Smart1on1Frequency!
  duration: Int!
  preferredDays: [Int!]!
  preferredTimes: [String!]!
  agendaTemplate: String
  isActive: Boolean!
  lastMeetingDate: DateTime
  nextMeetingDate: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum Smart1on1Frequency {
  WEEKLY
  BIWEEKLY
  MONTHLY
}

input CreateSmart1on1Input {
  title: String!
  participantEmail: String!
  frequency: Smart1on1Frequency!
  duration: Int!
  preferredDays: [Int!]!
  preferredTimes: [String!]!
  agendaTemplate: String
}

input UpdateSmart1on1Input {
  title: String
  participantEmail: String
  frequency: Smart1on1Frequency
  duration: Int
  preferredDays: [Int!]
  preferredTimes: [String!]
  agendaTemplate: String
  isActive: Boolean
}

# ============================================
# TRAVEL TIME
# ============================================

type TravelTime {
  fromLocation: String!
  toLocation: String!
  durationMinutes: Int!
  distance: String!
  mode: TravelMode!
}

enum TravelMode {
  DRIVING
  WALKING
  TRANSIT
  BICYCLING
}

input CalculateTravelTimeInput {
  fromLocation: String!
  toLocation: String!
  mode: TravelMode
  departureTime: DateTime
}

# ============================================
# NOTIFICATIONS
# ============================================

type Notification {
  id: ID!
  userId: ID!
  type: NotificationType!
  title: String!
  message: String!
  metadata: JSON
  isRead: Boolean!
  readAt: DateTime
  createdAt: DateTime!
}

type NotificationPreferences {
  id: ID!
  userId: ID!
  enableTaskReminders: Boolean!
  enableGoalMilestones: Boolean!
  enableWeeklyPlan: Boolean!
  enableDailyReminders: Boolean!
  enableOverbookedAlerts: Boolean!
  enableBreakReminders: Boolean!
  enableFocusTimeAlerts: Boolean!
  enableUpcomingMeetings: Boolean!
  reminderMinutesBefore: Int!
  quietHoursStart: String
  quietHoursEnd: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input UpdateNotificationPreferencesInput {
  enableTaskReminders: Boolean
  enableGoalMilestones: Boolean
  enableWeeklyPlan: Boolean
  enableDailyReminders: Boolean
  enableOverbookedAlerts: Boolean
  enableBreakReminders: Boolean
  enableFocusTimeAlerts: Boolean
  enableUpcomingMeetings: Boolean
  reminderMinutesBefore: Int
  quietHoursStart: String
  quietHoursEnd: String
}

# ============================================
# QUERIES
# ============================================

extend type Query {
  # Work Hours
  workHours: WorkHours

  # Focus Time Blocks
  focusTimeBlocks(isActive: Boolean): [FocusTimeBlock!]!
  focusTimeBlock(id: ID!): FocusTimeBlock

  # No Meeting Days
  noMeetingDays(isActive: Boolean): [NoMeetingDay!]!

  # Priority Hours
  priorityHours: PriorityHours

  # Calendar Defense
  calendarDefense: CalendarDefense

  # Kanban Boards
  kanbanBoards(projectId: ID): [KanbanBoard!]!
  kanbanBoard(id: ID!): KanbanBoard

  # Smart 1:1 Meetings
  smart1on1s: [Smart1on1!]!
  smart1on1(id: ID!): Smart1on1

  # Notifications
  notifications(unreadOnly: Boolean): [Notification!]!
  notificationPreferences: NotificationPreferences
}

# ============================================
# MUTATIONS
# ============================================

extend type Mutation {
  # Work Hours
  setWorkHours(input: WorkHoursInput!): WorkHours!
  updateWorkHours(input: WorkHoursInput!): WorkHours!

  # Focus Time Blocks
  createFocusBlock(input: CreateFocusBlockInput!): FocusTimeBlock!
  updateFocusBlock(id: ID!, input: UpdateFocusBlockInput!): FocusTimeBlock!
  deleteFocusBlock(id: ID!): Boolean!
  toggleFocusBlock(id: ID!): FocusTimeBlock!

  # No Meeting Days
  setNoMeetingDay(input: SetNoMeetingDayInput!): NoMeetingDay!
  removeNoMeetingDay(dayOfWeek: Int!): Boolean!
  toggleNoMeetingDay(dayOfWeek: Int!): NoMeetingDay!

  # Priority Hours
  setPriorityHours(input: PriorityHoursInput!): PriorityHours!

  # Calendar Defense
  setCalendarDefense(input: CalendarDefenseInput!): CalendarDefense!

  # Kanban Boards
  createKanbanBoard(input: CreateKanbanBoardInput!): KanbanBoard!
  updateKanbanBoard(id: ID!, input: UpdateKanbanBoardInput!): KanbanBoard!
  deleteKanbanBoard(id: ID!): Boolean!
  moveTaskInKanban(input: MoveTaskInKanbanInput!): Boolean!

  # Smart 1:1 Meetings
  createSmart1on1(input: CreateSmart1on1Input!): Smart1on1!
  updateSmart1on1(id: ID!, input: UpdateSmart1on1Input!): Smart1on1!
  deleteSmart1on1(id: ID!): Boolean!

  # Travel Time
  calculateTravelTime(input: CalculateTravelTimeInput!): TravelTime!

  # Notifications
  markNotificationAsRead(id: ID!): Boolean!
  updateNotificationPreferences(input: UpdateNotificationPreferencesInput!): NotificationPreferences!
}

# ============================================
# SUBSCRIPTIONS
# ============================================

extend type Subscription {
  # Work Hours
  workHoursUpdated: WorkHours!

  # Focus Time
  focusTimeCreated: FocusTimeBlock!
  focusTimeUpdated: FocusTimeBlock!
  focusTimeDeleted: ID!

  # No Meeting Days
  noMeetingDayCreated: NoMeetingDay!
  noMeetingDayDeleted: ID!

  # Kanban
  kanbanBoardUpdated: KanbanBoard!

  # Smart 1:1
  smart1on1Created: Smart1on1!
  smart1on1Updated: Smart1on1!
  smart1on1Deleted: ID!

  # Notifications
  notificationReceived: Notification!
  notificationRead: ID!
  notificationPreferencesUpdated: NotificationPreferences!
}
