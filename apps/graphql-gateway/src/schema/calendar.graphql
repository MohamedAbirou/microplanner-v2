# Calendar Integration & Sync

# ============================================
# CALENDAR TOKENS & CONNECTIONS
# ============================================

type CalendarConnection {
  id: ID!
  userId: ID!
  provider: CalendarProvider!
  email: String
  calendarId: String
  calendarName: String
  syncEnabled: Boolean!
  lastSyncAt: DateTime
  syncErrors: Int!
  lastError: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum CalendarProvider {
  GOOGLE
  OUTLOOK
  APPLE
}

type SyncResult {
  success: Boolean!
  provider: CalendarProvider!
  tasksAttempted: Int!
  tasksSucceeded: Int!
  tasksFailed: Int!
  duration: Int!
  errors: [SyncError!]!
}

type SyncError {
  taskId: ID
  message: String!
  code: String
}

type CalendarEvent {
  id: String!
  title: String!
  description: String
  start: DateTime!
  end: DateTime!
  allDay: Boolean!
  source: CalendarProvider!
  attendees: [String!]!
  location: String
}

# ============================================
# QUERIES
# ============================================

extend type Query {
  # Get all calendar connections
  calendarConnections: [CalendarConnection!]!

  # Get specific calendar connection
  calendarConnection(id: ID!): CalendarConnection!

  # Get all calendar events
  calendarEvents(startDate: DateTime, endDate: DateTime, calendarIds: [String!]): [CalendarEvent!]!

  # Get upcoming calendar events
  upcomingEvents(limit: Int, startDate: DateTime, endDate: DateTime): [CalendarEvent!]!

  # Get calendar busy slots
  busySlots(startDate: DateTime!, endDate: DateTime!): [BusySlot!]!
}

type BusySlot {
  start: DateTime!
  end: DateTime!
  title: String
}

# ============================================
# MUTATIONS
# ============================================

# Mutation signatures match the resolvers in calendar.resolver.ts, which pass
# through to the api-gateway connections API (connection-id based, not
# provider based — a user can have multiple connections).

input ConnectCalendarInput {
  provider: CalendarProvider!
  code: String!
  state: String
}

type CalendarAuthPayload {
  url: String!
  provider: String
}

input CreateCalendarEventInput {
  title: String!
  description: String
  start: DateTime!
  end: DateTime!
  allDay: Boolean
  location: String
}

input UpdateCalendarEventInput {
  title: String
  description: String
  start: DateTime
  end: DateTime
  location: String
}

extend type Mutation {
  # OAuth step 1: get the provider auth URL
  initiateCalendarAuth(provider: CalendarProvider!): CalendarAuthPayload!

  # OAuth step 2: exchange the code for a connection
  connectCalendar(input: ConnectCalendarInput!): CalendarConnection!

  # Disconnect a specific connection
  disconnectCalendar(id: ID!): Boolean!

  # Manually trigger sync for a connection
  syncCalendar(id: ID!): SyncResult!

  # Sync all connected calendars
  syncAllCalendars: [SyncResult!]!

  # Event CRUD
  createCalendarEvent(input: CreateCalendarEventInput!): CalendarEvent!
  updateCalendarEvent(id: String!, input: UpdateCalendarEventInput!): CalendarEvent!
  deleteCalendarEvent(id: String!): Boolean!
}

extend type CalendarConnection {
  events(limit: Int, startDate: DateTime, endDate: DateTime): [CalendarEvent!]!
}

# ============================================
# SUBSCRIPTIONS
# ============================================

extend type Subscription {
  # Calendar sync status updates
  calendarSyncStatus(userId: ID!): SyncResult!
}
